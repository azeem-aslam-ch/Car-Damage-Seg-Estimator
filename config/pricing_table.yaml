# Pricing Table Configuration (PKR)
# Edit base costs, severity multipliers, and location multipliers without code changes.

base_costs:
  dent: 7000
  scratch: 4000
  peel_paint: 6000
  broken: 10000

severity_multipliers:
  low: 1.0
  medium: 1.7
  high: 2.7

# Location multipliers applied on top of base × severity
location_multipliers:
  bumper: 1.2
  door: 1.1
  fender: 1.15
  hood: 1.25
  roof: 1.3
  unknown: 1.0

# Cost range factor: final cost = base_cost × severity_mult × location_mult × (1 ± range_factor)
range_factor: 0.15
