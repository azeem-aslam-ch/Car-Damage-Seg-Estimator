name: Sync Backend to Hugging Face Space
on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Copy backend files to a temporary directory to act as the root
          mkdir -p hf_space
          cp -r backend/* hf_space/
          
          cd hf_space
          git init
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          
          git add .
          git commit -m "Deploy from GitHub Actions"
          
          git push -f https://azeemaslam:$HF_TOKEN@huggingface.co/spaces/azeemaslam/car-damage-api main
