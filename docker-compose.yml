version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: car_damage_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./data/outputs:/app/data/outputs
      - ./data/reports:/app/data/reports
      - ./data/weights:/app/data/weights
      - ./data/sample_images:/app/data/sample_images
      - ./config:/app/config
    env_file:
      - .env
    environment:
      - OUTPUT_DIR=data/outputs
      - REPORTS_DIR=data/reports
      - WEIGHTS_DIR=data/weights
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: car_damage_frontend
    restart: unless-stopped
    ports:
      - "8501:8501"
    volumes:
      - ./data/outputs:/app/data/outputs
      - ./data/reports:/app/data/reports
    env_file:
      - .env
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      backend:
        condition: service_healthy

volumes:
  outputs:
  reports:
  weights:
